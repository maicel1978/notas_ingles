project:
  type: book
  output-dir: docs             # Cambiado de _book a docs para activar GitHub Pages directamente

lang: es
date-format: long              # Asegura un formato elegante de fecha en español

book:
  title: "El libro de notas de inglés"
  subtitle: "De A1 a C1 — El libro de notas de la carrera"
  author: "Maicel monzon"
  date: today
  cover-image: images/cover.png
  page-navigation: true
  search: true
  
  downloads:
    - pdf
    - epub
    
  chapters:
    - index.qmd
    - intro.qmd
    - part: "📘 Parte 1: Nivel A1"
      chapters:
        - cap01.qmd
        - cap02.qmd
        - cap03.qmd
        - cap04.qmd
    - part: "📗 Parte 2: Nivel A2"
      chapters:
        - cap05.qmd
        - cap06.qmd
        - cap07.qmd
    - part: "📙 Parte 3: Nivel B1"
      chapters:
        - cap08.qmd
        - cap09.qmd
        - cap10.qmd
        - cap11.qmd
        - cap12.qmd
        - cap13.qmd
    - part: "📕 Parte 4: Nivel B2"
      chapters:
        - cap14.qmd
        - cap15.qmd
        - cap16.qmd
        - cap17.qmd
        - cap18.qmd
        - cap19.qmd
        - cap20.qmd
        - cap21.qmd
        - cap22.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    number-sections: false     # Excelente elección para libros de idiomas
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    css: styles.css
    lightbox: true             # Activa zoom nativo y elegante en imágenes
    anchor-sections: true
    
  epub:
    toc: true
    cover-image: images/cover.png
    mathml: true               # Maximiza compatibilidad de fórmulas en lectores electrónicos
    
  pdf:
    documentclass: scrbook
    pdf-engine: lualatex
    toc: true
    number-sections: true
    number-depth: 2
    colorlinks: true
    geometry:
      - top=25mm
      - bottom=25mm
      - left=25mm
      - right=25mm
    include-in-header:
      text: |
        \usepackage{emoji}
        \usepackage{fontspec}
        \setmainfont{Arial}